spring.application.name=service-jean

server.port= 8080
spring.datasource.url=jdbc:mysql://localhost:3306/bd_jean?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# spring.jpa.hibernate.ddl-auto=create ->Borra y crea la BD
# spring.jpa.hibernate.ddl-auto=create-drop -> Crea y borra al cerrar
# spring.jpa.hibernate.ddl-auto=validate -> Solo revisa los datos
# spring.jpa.hibernate.ddl-auto=none -> No hace nada
# spring.jpa.hibernate.ddl-auto=update -> Mantiene los datos

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect